<!DOCTYPE html>
<html>
<head>
  <title>Control Your Character</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Palette pulled from the game itself: slime green + grass, with a
         warm gold pop for the primary action so it doesn't get lost against
         all the green. Hard edges + offset shadows instead of blur, to read
         as pixel/arcade rather than generic modern UI. */
      --ink: #16241a;
      --panel: #1f3326;
      --panel-light: #294633;
      --slime: #7ed957;
      --slime-dark: #4c9a2a;
      --gold: #ffc145;
      --gold-dark: #c9891f;
      --cream: #f3f7ee;
      --muted: #a9c2ac;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    /* Twitch stream as BACKGROUND, fills the whole viewport. Starts with
       pointer-events:none (game canvas above it gets all clicks/keys by
       default) — the #twitchControls button toggles this and the canvas's
       pointer-events in tandem so the player can be interacted with
       directly when needed. */
    #twitchBg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    #game {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 5; /* above twitch */
      background: transparent;
      display: block;
    }

    #loginOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 16, 11, 0.72);
      z-index: 10;
      font-family: 'Inter', Arial, sans-serif;
    }

    #loginOverlay .login-box {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 16px;
      background: var(--panel);
      padding: 28px 32px 24px;
      border: 3px solid var(--ink);
      box-shadow: 6px 6px 0 var(--ink);
      min-width: 300px;
    }

    #loginOverlay .login-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: var(--slime);
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 var(--ink);
      margin: 0 0 4px;
    }

    #loginOverlay .login-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #loginOverlay label {
      color: var(--muted);
      font-family: 'Inter', Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #usernameInput {
      font-family: 'Inter', Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 10px 12px;
      width: 200px;
      color: var(--ink);
      background: var(--cream);
      border: 2px solid var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      outline: none;
    }
    #usernameInput:focus {
      border-color: var(--slime);
      box-shadow: 3px 3px 0 var(--slime-dark);
    }
    #usernameInput::placeholder {
      color: #7a8a7d;
      font-weight: 400;
    }

    /* Pixel/arcade button: hard offset shadow that collapses on press,
       giving a tactile "pushed in" feel instead of a flat modern hover. */
    .pixel-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: var(--ink);
      background: var(--gold);
      border: 2px solid var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      padding: 12px 18px;
      cursor: pointer;
      transition: transform 0.05s ease, box-shadow 0.05s ease, background 0.15s ease;
    }
    .pixel-btn:hover {
      background: #ffd370;
    }
    .pixel-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 var(--ink);
    }
    .pixel-btn:focus-visible {
      outline: 3px solid var(--slime);
      outline-offset: 2px;
    }

    .pixel-btn-small {
      font-size: 11px;
      padding: 8px 12px;
      box-shadow: 3px 3px 0 var(--ink);
    }

    #twitchControls {
      position: absolute;
      top: 60px; /* below #connectionStatus, which also sits top-right */
      right: 14px;
      z-index: 20;
    }

    #usernameColor {
      width: 40px;
      height: 40px;
      padding: 0;
      border: 2px solid var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      cursor: pointer;
      background: var(--panel-light);
    }
    /* Strip the native inset look so our own pixel border reads cleanly. */
    #usernameColor::-webkit-color-swatch-wrapper { padding: 3px; }
    #usernameColor::-webkit-color-swatch { border: none; }
    #usernameColor::-moz-color-swatch { border: none; }

    #loginOverlay .hint {
      font-family: 'Inter', Arial, sans-serif;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 2px;
    }
    #loginOverlay .hint kbd {
      font-family: 'Inter', Arial, sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--ink);
      background: var(--slime);
      border: 1px solid var(--ink);
      border-radius: 3px;
      padding: 1px 5px;
      margin: 0 1px;
    }

    #connectionStatus {
      position: absolute;
      top: 14px;
      right: 14px;
      padding: 8px 14px;
      background: var(--panel);
      color: var(--cream);
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      letter-spacing: 0.5px;
      border: 2px solid var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      z-index: 20;
    }

    /* ---- Chat input bubble: only YOU see this, while typing. The sent
       message everyone sees is drawn on the canvas as a pixel speech
       bubble (see drawChatBubble in the script). Follows the player each
       frame via positionChatInput(). ---- */
    #chatInputWrap {
      position: absolute;
      display: none;
      z-index: 15;
      transform: translate(-50%, -100%);
    }
    #chatInput {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--ink);
      background: var(--cream);
      border: 2px solid var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      padding: 9px 10px;
      width: 220px;
      outline: none;
    }
    #chatInput:focus {
      border-color: var(--slime-dark);
    }
    #chatInput::placeholder {
      color: #7a8a7d;
    }

    /* ---- "Say in Twitch chat?" toggle: sits above the chat input, same
       pixel language as everything else (hard border, offset shadow,
       slime/gold palette). When ON, a sent message is ALSO relayed to the
       real Twitch channel chat via the server's StreamElements bot. ---- */
    #twitchToggleRow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--cream);
      user-select: none;
    }
    #twitchToggleRow .tt-label {
      background: var(--panel);
      border: 2px solid var(--ink);
      box-shadow: 2px 2px 0 var(--ink);
      padding: 5px 7px;
      letter-spacing: 0.5px;
    }
    #twitchToggle {
      width: 34px;
      height: 18px;
      border: 2px solid var(--ink);
      box-shadow: 2px 2px 0 var(--ink);
      background: var(--panel-light);
      cursor: pointer;
      position: relative;
      flex: none;
    }
    #twitchToggle .knob {
      position: absolute;
      top: 1px;
      left: 1px;
      width: 14px;
      height: 14px;
      background: var(--muted);
      transition: left 0.08s steps(2), background 0.08s;
    }
    #twitchToggle.on {
      background: var(--slime-dark);
    }
    #twitchToggle.on .knob {
      left: 17px;
      background: var(--gold);
    }
    #twitchToggle:focus-visible {
      outline: 3px solid var(--slime);
      outline-offset: 2px;
    }

    /* Pixel-step tail pointing down at your character. Two stacked squares
       instead of a smooth CSS triangle, to keep the retro blocky look. */
    #chatInputWrap::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -10px;
      width: 10px;
      height: 10px;
      transform: translateX(-50%);
      background: var(--cream);
      border: 2px solid var(--ink);
      border-top: none;
      box-shadow: 3px 3px 0 var(--ink);
    }

    /* Shown on <body> while #twitchControls has handed clicks/keys to the
       Twitch player, so it's obvious the game itself is temporarily not
       receiving input. */
    body.stream-interactive::after {
      content: '';
      position: fixed;
      inset: 0;
      border: 4px solid var(--gold);
      box-shadow: inset 0 0 24px rgba(255, 193, 69, 0.5);
      pointer-events: none;
      z-index: 25;
    }
  </style>
</head>

<body>
  <!-- Twitch stream as BACKGROUND (same size as game, behind it). Its src is
       set dynamically in JS below so the required "parent" param always
       matches whatever domain is actually serving this page. The `allow`
       attribute is what actually grants this cross-origin iframe permission
       to autoplay -- without it, browsers block autoplay here regardless of
       the muted/autoplay URL params, silently, with no error to catch. -->
  <iframe
    id="twitchBg"
    allow="autoplay; encrypted-media; picture-in-picture"
    allowfullscreen="true">
  </iframe>

  <canvas id="game"></canvas>

  <div id="connectionStatus" style="display:none;">Connecting...</div>

  <button id="twitchControls" class="pixel-btn pixel-btn-small">📺 Interact with Stream</button>

  <!-- Private chat composer — hidden until you press T in-game. -->
  <div id="chatInputWrap">
    <div id="twitchToggleRow">
      <span class="tt-label">SAY IN TWITCH CHAT?</span>
      <div id="twitchToggle" role="switch" aria-checked="false" tabindex="0">
        <span class="knob"></span>
      </div>
    </div>
    <input id="chatInput" type="text" maxlength="100" placeholder="Say something..." autocomplete="off" />
  </div>

  <div id="loginOverlay">
    <div class="login-box">
      <p class="login-title">JOIN THE GAME</p>
      <p id="loginMessage" class="hint" style="display:none; color: var(--gold); margin: 0;"></p>
      <div class="login-row">
        <input id="usernameInput" type="text" placeholder="Username" maxlength="20" />
        <input id="usernameColor" type="color" value="#1e3fff" title="Name color" />
      </div>
      <button id="usernameBtn" class="pixel-btn">GO</button>
      <p class="hint"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or arrow keys to move · <kbd>T</kbd> to chat</p>
    </div>
  </div>

  <script src="https://interactive-website-9620.onrender.com/socket.io/socket.io.js"></script>
  <script>
    // ---- Twitch background --------------------------------------------------
    // Twitch requires a "parent" param that exactly matches the hostname the
    // page is actually loaded from (no protocol, no port), or the embed just
    // shows a "refused to connect" error. Building it from window.location
    // means this keeps working whether you're on the Render URL, a custom
    // domain, or testing on localhost — no manual editing needed per-deploy.
    //
    // WHICH channel to embed is decided SERVER-SIDE by the isEberhex env var
    // on Render and fetched from /config — so switching hosts (eberhex <->
    // izu_kora) is a one-variable change on the server, with no edit to this
    // file. If the config request fails for any reason, we fall back to the
    // value below so the page still shows *a* stream.
    let TWITCH_CHANNEL = 'izu_kora'; // fallback until /config responds

    async function setupTwitchBackground() {
      if (!window.location.hostname) {
        console.warn('Twitch embed needs a real hostname (http/https) — opening this file directly (file://) will not work.');
        return;
      }

      // Same-origin fetch: viewer.html is served by the same Render service,
      // so a relative /config needs no CORS. (If you ever serve this page
      // from a different origin than the server, switch this to the full
      // server URL and enable CORS on the /config route.)
      try {
        const res = await fetch('/config');
        if (res.ok) {
          const cfg = await res.json();
          if (cfg && cfg.twitchChannel) TWITCH_CHANNEL = cfg.twitchChannel;
        }
      } catch (e) {
        console.warn('Could not fetch /config — using fallback channel:', TWITCH_CHANNEL, e);
      }

      const parents = [window.location.hostname];
      // If you test locally alongside the deployed site, uncomment:
      // parents.push('localhost');

      const parentParams = parents.map(p => `parent=${encodeURIComponent(p)}`).join('&');
      const twitchBg = document.getElementById('twitchBg');
      twitchBg.src = `https://player.twitch.tv/?channel=${encodeURIComponent(TWITCH_CHANNEL)}&${parentParams}&muted=true&autoplay=true`;
    }
    setupTwitchBackground();

    // Fallback that's always available regardless of whether autoplay
    // worked: some things Twitch will never let a script click through on
    // the viewer's behalf, by design — a mature-content consent gate, or a
    // browser that's decided to block autoplay for this site entirely.
    // Both require an actual click inside the Twitch player itself. Since
    // the background layer sits under the game canvas with
    // pointer-events:none (so the canvas can normally receive all clicks/
    // keys), this button temporarily swaps that: canvas stops receiving
    // clicks, the Twitch iframe starts receiving them, so its own native
    // play button / consent screen / volume control can be clicked directly
    // like a normal webpage. Click again to hand control back to the game.
    let streamInteractive = false;
    const twitchControlsBtn = document.getElementById('twitchControls');
    twitchControlsBtn.addEventListener('click', () => {
      streamInteractive = !streamInteractive;
      canvas.style.pointerEvents = streamInteractive ? 'none' : 'auto';
      document.getElementById('twitchBg').style.pointerEvents = streamInteractive ? 'auto' : 'none';
      document.body.classList.toggle('stream-interactive', streamInteractive);
      twitchControlsBtn.textContent = streamInteractive ? '🎮 Return to Game' : '📺 Interact with Stream';
      if (!streamInteractive) canvas.focus();
    });

    // ---- Socket connection ---------------------------------------------------
    const socket = io("https://interactive-website-9620.onrender.com", {
      reconnection: true,
      reconnectionAttempts: Infinity,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 10000, // tolerate a slow Render cold-start
      timeout: 30000,
    });

    const connectionStatus = document.getElementById('connectionStatus');
    connectionStatus.style.display = 'block'; // "Connecting..." until first connect

    socket.on('connect', () => {
      connectionStatus.style.display = 'none';
    });
    socket.on('disconnect', () => {
      connectionStatus.textContent = 'Reconnecting...';
      connectionStatus.style.display = 'block';
    });
    socket.io.on('reconnect_attempt', (attempt) => {
      connectionStatus.textContent = `Reconnecting... (attempt ${attempt})`;
      connectionStatus.style.display = 'block';
    });

    const box_1_img = new Image();
    box_1_img.src = '/assets/obstacles/box_1.png';
    box_1_img.onload = () => {
      requestAnimationFrame(gameLoop);
    }

    const trampoline_img = new Image();
    trampoline_img.src = '/assets/obstacles/trampoline.png';
    trampoline_img.onload = () => {
      requestAnimationFrame(gameLoop);
    }

    const idleImg = new Image();
    idleImg.src = '/assets/characters/craftpix-net-879657-free-slime-mobs-pixel-art-top-down-sprite-pack/PNG/Slime1/Idle/Slime1_Idle_body.png';
    idleImg.onload = () => {
      requestAnimationFrame(gameLoop);
    };

    const runImg = new Image();
    runImg.src = '/assets/characters/craftpix-net-879657-free-slime-mobs-pixel-art-top-down-sprite-pack/PNG/Slime1/Run/Slime1_Run_body.png';
    runImg.onload = () => {
      requestAnimationFrame(gameLoop);
    }

    const coinImg = new Image();
    coinImg.src = '/assets/obstacles/coin.png';
    coinImg.onload = () => {
      requestAnimationFrame(gameLoop);
    }

    const grassImg = new Image();
    grassImg.src = '/assets/obstacles/grass.png';
    grassImg.onload = () => {
      requestAnimationFrame(gameLoop);
    }

    let img = idleImg
    const animations = {
      frameWidth: 64,
      frameHeight: 64,
      frameCount: 6,
      currentFrame: 0,
      frameRow: 0
    };
    const canvas = document.getElementById('game');
    canvas.setAttribute('tabindex', '0');
    canvas.focus();

    const box1 = canvas.getContext('2d');
    const trampoline = canvas.getContext('2d');
    const playObj = canvas.getContext('2d');

    // ---- World vs view --------------------------------------------------
    // The WORLD is now wider than what's on screen: 3000 world units across,
    // three "screens" of playable level. The VIEW is the fixed-size window
    // the player sees at any moment (one screen's worth), and it's the view
    // — not the world — that gets scaled up to fill the browser window.
    // WORLD_WIDTH/HEIGHT and the box layout MUST stay in sync with
    // overlay.html (and the coin spots in server.js).
    const WORLD_WIDTH = 3000;
    const WORLD_HEIGHT = 500;
    const VIEW_WIDTH = 1000;   // world units visible horizontally at once
    const VIEW_HEIGHT = 500;   // full world height is always visible

    // Horizontal camera. Follows the player, clamped so it never shows past
    // the world's left or right edge. Y never moves — vertical is fixed.
    let cameraX = 0;

    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      // Uniform scale so sprites don't stretch/distort; letterbox to center.
      // Scale is based on the VIEW (the visible window), not the world.
      scale = Math.min(canvas.width / VIEW_WIDTH, canvas.height / VIEW_HEIGHT);
      offsetX = (canvas.width - VIEW_WIDTH * scale) / 2;
      offsetY = (canvas.height - VIEW_HEIGHT * scale) / 2;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const boxes = [
      {x: 0, y: 400, width: 20, height: 20},
      {x: 80, y: 450, width: 20, height: 20},
      {x: 100, y: 450, width: 20, height: 20},
      {x: 120, y: 450, width: 20, height: 20},
      {x: 90, y: 350, width: 20, height: 20},
      {x: 110, y: 350, width: 20, height: 20},
      {x: 200, y: 400, width: 20, height: 20},
      {x: 300, y: 480, width: 20, height: 20},
      {x: 420, y: 420, width: 20, height: 20},
      {x: 440, y: 420, width: 20, height: 20},
      {x: 550, y: 380, width: 20, height: 20},
      {x: 620, y: 340, width: 20, height: 20},
      {x: 645, y: 360, width: 20, height: 20},
      {x: 670, y: 340, width: 20, height: 20},
      {x: 750, y: 380, width: 20, height: 20},
      {x: 770, y: 380, width: 20, height: 20},
      {x: 790, y: 380, width: 20, height: 20},
      {x: 750, y: 440, width: 20, height: 20},
      {x: 770, y: 440, width: 20, height: 20},
      {x: 790, y: 440, width: 20, height: 20},

      {x: 860, y: 400, width: 20, height: 20},
      {x: 860, y: 380, width: 20, height: 20},

      {x: 980, y: 380, width: 20, height: 20},

      // ---- Extended world: second screen (1000-2000) ----
      {x: 1060, y: 440, width: 20, height: 20},
      {x: 1080, y: 440, width: 20, height: 20},
      {x: 1160, y: 400, width: 20, height: 20},
      {x: 1240, y: 360, width: 20, height: 20},
      {x: 1260, y: 360, width: 20, height: 20},
      {x: 1350, y: 440, width: 20, height: 20},
      {x: 1370, y: 440, width: 20, height: 20},
      {x: 1390, y: 440, width: 20, height: 20},
      {x: 1380, y: 340, width: 20, height: 20},
      {x: 1400, y: 340, width: 20, height: 20},
      {x: 1500, y: 400, width: 20, height: 20},
      {x: 1520, y: 400, width: 20, height: 20},
      {x: 1600, y: 340, width: 20, height: 20},
      {x: 1660, y: 380, width: 20, height: 20},
      {x: 1680, y: 380, width: 20, height: 20},
      {x: 1780, y: 460, width: 20, height: 20},
      {x: 1780, y: 440, width: 20, height: 20},
      {x: 1780, y: 420, width: 20, height: 20},
      {x: 1860, y: 400, width: 20, height: 20},
      {x: 1880, y: 400, width: 20, height: 20},
      {x: 1960, y: 360, width: 20, height: 20},

      // ---- Extended world: third screen (2000-3000) ----
      {x: 2040, y: 440, width: 20, height: 20},
      {x: 2060, y: 440, width: 20, height: 20},
      {x: 2140, y: 400, width: 20, height: 20},
      {x: 2220, y: 360, width: 20, height: 20},
      {x: 2240, y: 360, width: 20, height: 20},
      {x: 2320, y: 420, width: 20, height: 20},
      {x: 2400, y: 460, width: 20, height: 20},
      {x: 2420, y: 460, width: 20, height: 20},
      {x: 2440, y: 460, width: 20, height: 20},
      {x: 2420, y: 440, width: 20, height: 20},
      {x: 2540, y: 400, width: 20, height: 20},
      {x: 2620, y: 360, width: 20, height: 20},
      {x: 2640, y: 360, width: 20, height: 20},
      {x: 2720, y: 420, width: 20, height: 20},
      {x: 2740, y: 420, width: 20, height: 20},
      {x: 2840, y: 380, width: 20, height: 20},
      {x: 2900, y: 440, width: 20, height: 20},
      {x: 2920, y: 440, width: 20, height: 20},
      {x: 2980, y: 400, width: 20, height: 20},
    ];
    const player = {
      x: 100,
      y: 480,
      width: 20,
      height: 20,
      Yv: 0,
      Yforce: 0,
      YforceMax: 0.5,
      Xv: 0,
      gravity: 500,
      onGround: false,
      friction: 1200,
      speedMax : 150,
      running : false,
      jumping: false,
      username: "",
      color: "#1e3fff",
      action: "idle",
      score: 0,
      chatMessage: null,
      chatExpiresAt: 0
    };

    // ---- Other connected players, keyed by socket id ----
    // Each entry carries both the latest known true position (x/y, from the
    // server) and a smoothed render position (renderX/renderY) that eases
    // toward it every frame — see updateOtherPlayersInterpolation() below.
    // This is what removes the teleport/stutter look between network updates.
    const otherPlayers = {};

    socket.on("init", (data) => {
      // The server sends "init" on every connection, including reconnects.
      // Clear first so anyone who left while we were disconnected doesn't
      // linger as a ghost.
      for (const id in otherPlayers) {
        delete otherPlayers[id];
      }
      for (const id in data) {
        if (id !== socket.id) {
          const p = data[id];
          otherPlayers[id] = { ...p, renderX: p.x, renderY: p.y, lastUpdateAt: performance.now() };
        }
      }
    });

    socket.on("new-player", (data) => {
      if (data.id !== socket.id) {
        otherPlayers[data.id] = { ...data, renderX: data.x, renderY: data.y, lastUpdateAt: performance.now() };
      }
    });

    socket.on("player-move", (data) => {
      if (data.id !== socket.id) {
        const existing = otherPlayers[data.id];
        if (existing) {
          // Merge into the SAME object so renderX/renderY and the local
          // animation state below survive — this is what lets the
          // interpolation keep easing toward the new target instead of
          // snapping to it.
          Object.assign(existing, data);
          existing.lastUpdateAt = performance.now();
        } else {
          otherPlayers[data.id] = { ...data, renderX: data.x, renderY: data.y, lastUpdateAt: performance.now() };
        }
      }
    });

    socket.on("remove-player", (id) => {
      delete otherPlayers[id];
    });

    // How quickly the rendered position catches up to the real one. Smaller
    // = snappier but more visible stutter; larger = smoother but more lag.
    const OTHER_PLAYER_SMOOTHING_TAU = 0.08; // seconds

    function updateOtherPlayersInterpolation(deltaTime) {
      const factor = 1 - Math.exp(-deltaTime / OTHER_PLAYER_SMOOTHING_TAU);
      for (const id in otherPlayers) {
        const p = otherPlayers[id];
        p.renderX += (p.x - p.renderX) * factor;
        p.renderY += (p.y - p.renderY) * factor;
      }
    }

    // If another player's tab gets backgrounded, their browser throttles its
    // requestAnimationFrame loop and stops sending fresh frameIndex values —
    // without this, they'd freeze mid-animation on our screen too. Animate
    // everyone's sprite locally instead, only taking emote/frameRow (facing
    // direction) from the network, and falling back to idle if we haven't
    // heard from them in a while.
    const OTHER_PLAYER_FRAME_INTERVAL = 0.1; // seconds per animation frame
    const OTHER_PLAYER_STALE_MS = 600;

    function updateOtherPlayersAnimation(deltaTime) {
      const now = performance.now();
      for (const id in otherPlayers) {
        const p = otherPlayers[id];
        const stale = (now - (p.lastUpdateAt || 0)) > OTHER_PLAYER_STALE_MS;
        const emote = stale ? 'idle' : (p.emote || 'idle');
        const frameCount = emote === 'run' ? 8 : 6;

        p.localFrameTimer = (p.localFrameTimer || 0) + deltaTime;
        if (p.localFrameTimer >= OTHER_PLAYER_FRAME_INTERVAL) {
          p.localFrameTimer -= OTHER_PLAYER_FRAME_INTERVAL;
          p.localFrameIndex = ((p.localFrameIndex || 0) + 1) % frameCount;
        }
        if (!(p.localFrameIndex < frameCount)) p.localFrameIndex = 0;

        p.displayEmote = emote;
        p.displayFrameRow = emote === 'run' ? (p.frameRow ?? 3) : 0;
        p.displayFrameIndex = p.localFrameIndex;
      }
    }

    // ---- Chat ----------------------------------------------------------------
    // Press T -> a private input bubble opens above YOUR character (nobody
    // else sees it). Press Enter -> the message is sent to the server, which
    // filters it and broadcasts the clean version to everyone (including you,
    // so what you see is exactly what others see). Escape cancels.
    const CHAT_MAX_LENGTH = 100;
    const CHAT_DURATION_MS = 6000; // how long a sent bubble stays visible

    const chatInputWrap = document.getElementById('chatInputWrap');
    const chatInput = document.getElementById('chatInput');
    let chatOpen = false;

    // ---- "Say in Twitch chat?" toggle ----
    // When ON, a sent message is ALSO relayed to the real Twitch channel
    // chat (server-side, via your StreamElements bot). Defaults OFF on every
    // page load so nobody accidentally broadcasts; the choice persists while
    // the page stays open (across repeated chat opens).
    let sayInTwitch = false;
    const twitchToggle = document.getElementById('twitchToggle');
    function renderTwitchToggle() {
      twitchToggle.classList.toggle('on', sayInTwitch);
      twitchToggle.setAttribute('aria-checked', sayInTwitch ? 'true' : 'false');
    }
    function toggleSayInTwitch() {
      sayInTwitch = !sayInTwitch;
      renderTwitchToggle();
    }
    twitchToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleSayInTwitch();
      chatInput.focus(); // keep typing focus after toggling
    });
    twitchToggle.addEventListener('keydown', (e) => {
      e.stopPropagation();
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        toggleSayInTwitch();
      }
    });
    renderTwitchToggle();

    function openChat() {
      if (chatOpen || !hasJoined) return;
      chatOpen = true;
      // Stop any held movement — while the input has focus, the canvas
      // stops receiving keyup events, so a held key would run forever.
      player.running = false;
      player.jumping = false;
      chatInputWrap.style.display = 'block';
      positionChatInput();
      chatInput.value = '';
      chatInput.focus();
    }

    function closeChat() {
      chatOpen = false;
      chatInputWrap.style.display = 'none';
      chatInput.value = '';
      canvas.focus();
    }

    chatInput.addEventListener('keydown', (e) => {
      e.stopPropagation(); // typing must never move the character
      if (e.key === 'Enter') {
        const message = chatInput.value.trim().slice(0, CHAT_MAX_LENGTH);
        // Include the toggle state so the server knows whether to relay this
        // one to real Twitch chat as well as the in-game bubble.
        if (message) socket.emit('chat', { message, toTwitch: sayInTwitch });
        closeChat();
      } else if (e.key === 'Escape') {
        closeChat();
      }
    });

    // Keep the composer hovering above your character. World coords ->
    // screen coords using the same scale/offset/camera the canvas draws
    // with, so it stays glued to the slime while the view scrolls.
    function positionChatInput() {
      if (!chatOpen) return;
      const screenX = offsetX + (player.x + player.width / 2 - cameraX) * scale;
      const screenY = offsetY + (player.y - 30) * scale;
      chatInputWrap.style.left = `${screenX}px`;
      chatInputWrap.style.top = `${screenY}px`;
    }

    // The server broadcasts the FILTERED message to everyone, sender
    // included — rendering only what comes back keeps every screen showing
    // the identical censored text.
    socket.on('chat', (data) => {
      if (!data || typeof data.message !== 'string' || !data.message) return;
      const expiresAt = performance.now() + CHAT_DURATION_MS;
      if (data.id === socket.id) {
        player.chatMessage = data.message;
        player.chatExpiresAt = expiresAt;
      } else if (otherPlayers[data.id]) {
        otherPlayers[data.id].chatMessage = data.message;
        otherPlayers[data.id].chatExpiresAt = expiresAt;
      }
    });

    // ---- Pixel speech bubble rendering (canvas, world space) ----
    const CHAT_FONT = '8px "Press Start 2P", monospace';
    const CHAT_LINE_HEIGHT = 12;
    const CHAT_PAD = 6;
    const CHAT_MAX_LINE_CHARS = 18;

    function wrapChatLines(text, maxChars) {
      const lines = [];
      let line = '';
      for (let word of text.split(' ')) {
        // Hard-break words longer than a whole line so they can't blow the
        // bubble out sideways.
        while (word.length > maxChars) {
          if (line) { lines.push(line); line = ''; }
          lines.push(word.slice(0, maxChars));
          word = word.slice(maxChars);
        }
        if (!word) continue;
        if (!line) {
          line = word;
        } else if (line.length + 1 + word.length <= maxChars) {
          line += ' ' + word;
        } else {
          lines.push(line);
          line = word;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    // Hard-edged box + offset shadow + blocky stepped tail: same visual
    // language as the login panel and HUD chip, no rounded corners, no blur.
    function drawChatBubble(ctx, text, cx, bottomY) {
      const lines = wrapChatLines(text, CHAT_MAX_LINE_CHARS);
      ctx.font = CHAT_FONT;
      let maxW = 0;
      for (const l of lines) maxW = Math.max(maxW, ctx.measureText(l).width);
      const w = Math.ceil(maxW) + CHAT_PAD * 2;
      const h = lines.length * CHAT_LINE_HEIGHT + CHAT_PAD * 2 - 3;
      const x = Math.round(cx - w / 2);
      const y = Math.round(bottomY - h - 8); // leave room for the tail

      // Offset shadow, then body, then border.
      ctx.fillStyle = '#16241a';
      ctx.fillRect(x + 2, y + 2, w, h);
      ctx.fillStyle = '#f3f7ee';
      ctx.fillRect(x, y, w, h);
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#16241a';
      ctx.strokeRect(x, y, w, h);

      // Pixel-step tail (two shrinking blocks) pointing at the character.
      ctx.fillStyle = '#16241a';
      ctx.fillRect(cx - 5, y + h, 10, 5);
      ctx.fillRect(cx - 3, y + h + 3, 6, 5);
      ctx.fillStyle = '#f3f7ee';
      ctx.fillRect(cx - 3, y + h - 1, 6, 4);
      ctx.fillRect(cx - 1, y + h + 3, 2, 3);

      ctx.fillStyle = '#16241a';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      let ty = y + CHAT_PAD;
      for (const l of lines) {
        ctx.fillText(l, x + CHAT_PAD, ty);
        ty += CHAT_LINE_HEIGHT;
      }
    }

    // The server removes characters that haven't actually moved (or chatted)
    // in a while, so idle slimes don't clutter the stream/overlay. When that
    // happens to US, bring the join screen back with a note — one click on
    // GO re-joins with the same name and color.
    socket.on('afk-removed', () => {
      hasJoined = false;
      if (chatOpen) closeChat();
      player.chatMessage = null;
      const overlay = document.getElementById('loginOverlay');
      const msg = document.getElementById('loginMessage');
      msg.textContent = 'Removed after 2 minutes of inactivity — jump back in!';
      msg.style.display = 'block';
      overlay.style.display = 'flex';
    });

    // Only sent once a username has actually been chosen — this is what the
    // server uses to decide whether a socket should get a visible character
    // at all, so a spectator-only connection (like overlay.html) never spawns
    // a ghost player just by connecting.
    let hasJoined = false;
    function sendJoin() {
      if (!hasJoined) return;
      socket.emit('join', { username: player.username, color: player.color });
    }
    // Re-join automatically after a reconnect (fires on first connect too,
    // when it's a harmless no-op since hasJoined is still false then).
    socket.on('connect', sendJoin);

    let lastTime = performance.now();
    usernameprompt();
    function usernameprompt(){
      const overlay = document.getElementById('loginOverlay');
      const input = document.getElementById('usernameInput');
      const button = document.getElementById('usernameBtn');
      const colorInput = document.getElementById('usernameColor');

      button.addEventListener('click', () => {
        const name = input.value.trim() || 'Player1';
        player.username = name;
        player.color = colorInput.value || '#1e3fff';
        hasJoined = true;
        sendJoin();
        document.getElementById('loginMessage').style.display = 'none';
        overlay.style.display = 'none';
        canvas.focus();  // Return focus to canvas for key events
      });
    }

    function gameLoop(currentTime) {
      const deltaTime = (currentTime - lastTime)/1000;
      lastTime = currentTime;

      update(deltaTime);
      draw();

      requestAnimationFrame(gameLoop);
    }

    let frameTimer = 0;
    let animationStopper = false;
    const frameInterval = 0.1;

    // draw() runs every animation frame (~60/sec). Broadcasting "move" that
    // often per player adds up fast with several people connected. Capping
    // it to ~30/sec is still smooth and roughly halves the socket traffic.
    let lastMoveEmit = 0;
    const MOVE_EMIT_INTERVAL_MS = 33;
    let coin = null;
    socket.on("coin", data => {
      coin = data;
      console.log("Coin received:", data.x, data.y);
    });
    socket.on("coin_taken", () => {
      coin = null;
    });
    function update(deltaTime) {

      updateOtherPlayersInterpolation(deltaTime);
      updateOtherPlayersAnimation(deltaTime);

      frameTimer += deltaTime;
      if (frameTimer >= frameInterval) {
        animations.currentFrame = (animations.currentFrame + 1) % animations.frameCount;
        frameTimer = 0;
      }

      // ---- Ground-state logic (uses last frame's onGround result) ----
      if (player.onGround) {
        if (player.jumping) {
          player.Yforce += deltaTime;
        }
        if (player.Xv >= -29 && player.Xv <= 29 && player.running == false) {
          player.Xv = 0;
          if (animationStopper == false) {
            img = idleImg
            player.action = "idle";
            animations.currentFrame = 0;
            animations.frameCount = 6;
            animations.frameRow = 0;
            animationStopper = true;
          }
        }
        if (player.running == false && player.Xv > 0) {
          player.Xv -= player.friction*deltaTime;
        } else if (player.running == false && player.Xv < 0){
          player.Xv += player.friction*deltaTime;
        }
      }

      // =====================================================================
      // Collision, rewritten to be clip-proof. The old code checked all four
      // sides of a box in one pass and, on side hits, only ever adjusted
      // VELOCITY — never position. Push into a box for a couple of frames
      // (or clip a corner during a fast fall) and you could end a frame
      // genuinely inside it, where none of the side checks made sense any
      // more, and you'd slide through.
      //
      // New approach, the standard platformer fix:
      //   1. Move ONE AXIS AT A TIME (X fully resolved, then Y).
      //   2. Detect hits by SWEPT checks — "was I on this side of the face
      //      before the move, and past it after?" — which can't tunnel at
      //      high speed the way pure overlap checks can.
      //   3. On a hit, CLAMP POSITION to the face that was crossed, so a
      //      frame can never end inside a box.
      //   4. Keep a depenetration fallback that pushes out through the
      //      nearest face if some weird prior state left us overlapping.
      // =====================================================================

      // ---- X axis: integrate, then resolve against box left/right faces ----
      const prevX = player.x;
      player.x += player.Xv*deltaTime;

      // Resolving against one box can push you into an adjacent one that
      // the loop already passed — so repeat until nothing moves (2 passes
      // covers every box chain in this level; 3 is a safety cap).
      for (let resolvePass = 0; resolvePass < 3; resolvePass++) {
        let movedX = false;
        for (const box of boxes) {
          // Standing exactly on top (y+height === box.y) is NOT vertical
          // overlap, so walking across the seam of two adjacent boxes never
          // snags on the next box's side face.
          const verticalOverlap =
            player.y + player.height > box.y &&
            player.y < box.y + box.height;
          if (!verticalOverlap) continue;

          const nowIntersectsX =
            player.x + player.width > box.x &&
            player.x < box.x + box.width;
          if (!nowIntersectsX) continue;

          const wasLeftOf = prevX + player.width <= box.x;
          const wasRightOf = prevX >= box.x + box.width;

          if (wasLeftOf) {
            // Crossed the left face this frame — clamp to it, bounce away
            // (same knock-back feel the old side hits had).
            player.x = box.x - player.width;
            player.Xv = -80;
          } else if (wasRightOf) {
            player.x = box.x + box.width;
            player.Xv = 80;
          } else {
            // Already overlapping before the move (bad prior state): push out
            // through whichever face is closest instead of letting it fester.
            const pushLeft = (player.x + player.width) - box.x;
            const pushRight = (box.x + box.width) - player.x;
            if (pushLeft <= pushRight) {
              player.x = box.x - player.width;
              player.Xv = Math.min(player.Xv, -80);
            } else {
              player.x = box.x + box.width;
              player.Xv = Math.max(player.Xv, 80);
            }
          }
          movedX = true;
        }
        if (!movedX) break;
      }

      // World bounds (X) — same bounce-back as before.
      if (player.x <= 0) {
        player.x = 0;
        player.Xv = 80;
      } else if (player.x + player.width >= WORLD_WIDTH) {
        player.x = WORLD_WIDTH - player.width;
        player.Xv = -80;
      }

      // ---- Y axis: integrate gravity, then resolve tops/undersides ----
      const prevY = player.y;
      if (!player.onGround) {
        player.Yv += player.gravity*deltaTime;
      }
      player.y += player.Yv*deltaTime;

      player.onGround = false; // recomputed below from actual contacts

      for (let resolvePass = 0; resolvePass < 3; resolvePass++) {
        let movedY = false;
        for (const box of boxes) {
          const horizontalOverlap =
            player.x + player.width > box.x &&
            player.x < box.x + box.width;
          if (!horizontalOverlap) continue;

          const wasAbove = prevY + player.height <= box.y;
          const wasBelow = prevY >= box.y + box.height;

          if (player.Yv >= 0 && wasAbove && player.y + player.height >= box.y) {
            // Landed on top. Swept: we were above the top face and are now at
            // or past it — even if a fast fall carried us clear past the whole
            // box in one frame, this still catches it (no tunneling). The >=
            // comparisons also hold true while standing still, which is what
            // keeps a stationary player grounded frame after frame.
            if (player.y !== box.y - player.height) movedY = true;
            player.y = box.y - player.height;
            player.Yv = 0;
            player.onGround = true;
          } else if (player.Yv < 0 && wasBelow && player.y < box.y + box.height) {
            // Bonked the underside mid-jump.
            player.y = box.y + box.height;
            player.Yv = 10;
            movedY = true;
          } else if (
            player.y + player.height > box.y &&
            player.y < box.y + box.height
          ) {
            // Depenetration fallback for ANY leftover intersection the swept
            // branches didn't claim. This genuinely happens: bonking the
            // underside of one box can clamp you into a diagonally adjacent
            // box whose "was I above/below it?" answers don't match either
            // swept branch. Exit via the nearest face; on a tie, exit in the
            // direction you're already moving so the correction doesn't
            // fight the motion.
            const pushUp = (player.y + player.height) - box.y;
            const pushDown = (box.y + box.height) - player.y;
            const preferUp = pushUp < pushDown || (pushUp === pushDown && player.Yv <= 0);
            if (preferUp) {
              player.y = box.y - player.height;
              if (player.Yv > 0) player.Yv = 0;
              player.onGround = true;
            } else {
              player.y = box.y + box.height;
              if (player.Yv < 0) player.Yv = 10;
            }
            movedY = true;
          }
        }
        if (!movedY) break;
      }

      // World floor.
      if (player.y + player.height >= WORLD_HEIGHT) {
        player.y = WORLD_HEIGHT - player.height;
        player.Yv = 0;
        player.onGround = true;
      }

      // ---- Camera: follow the player horizontally, clamped to the world ----
      // Centered on the player, but never allowed to show past either edge:
      // cameraX lives in [0, WORLD_WIDTH - VIEW_WIDTH]. X only — Y is fixed.
      cameraX = player.x + player.width / 2 - VIEW_WIDTH / 2;
      cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH - VIEW_WIDTH));

      // ---- Coin pickup (position is final for this frame at this point) ----
      if (coin != null) {
        let coin_touching = 
          player.x < coin.x + 10 &&
          player.x + player.width > coin.x &&
          player.y < coin.y + 10 &&
          player.y + player.height > coin.y

        if (coin_touching) {
          console.log("recieved a coin");
          coin = null;
          player.score++;
          socket.emit("coin_taken");
        }
      }
    }

    const GROUND_GRASS_HEIGHT = 14;
    const GROUND_TILE_WIDTH = 40;

    function drawGrassGround() {
      // The world floor at WORLD_HEIGHT is where players actually land
      // (see the ground-collision check in update()) but had no visual
      // representation before — tile the grass strip across it.
      for (let x = 0; x < WORLD_WIDTH; x += GROUND_TILE_WIDTH) {
        playObj.drawImage(grassImg, x, WORLD_HEIGHT - GROUND_GRASS_HEIGHT, GROUND_TILE_WIDTH, GROUND_GRASS_HEIGHT);
      }
    }

    function setObjects() {
      drawGrassGround();
      for (const box of boxes) {
        playObj.drawImage(box_1_img, box.x-5, box.y-5, box.width +12, box.height +12);
      }
      if (coin != null) {
        playObj.drawImage(coinImg, coin.x, coin.y, 20, 20);
      }
    }

    function drawOtherPlayer(p) {
      const fw = 64, fh = 64;
      const sprite = p.displayEmote === "run" ? runImg : idleImg;
      const rx = p.renderX ?? p.x;
      const ry = p.renderY ?? p.y;

      playObj.drawImage(
        sprite,
        (p.displayFrameIndex || 0) * fw,
        (p.displayFrameRow || 0) * fh,
        fw, fh,
        rx - 20, ry - 20,
        fw, fh
      );

      playObj.font = '16px Arial';
      playObj.fillStyle = p.color || 'blue';
      playObj.textAlign = 'center';
      playObj.textBaseline = 'bottom';
      playObj.fillText(p.username || '', rx + 10, ry - 5);
    }

    function draw() {
      // Clear the full physical canvas in raw pixel space first.
      playObj.setTransform(1, 0, 0, 1, 0, 0);
      playObj.clearRect(0, 0, canvas.width, canvas.height);

      // Everything below is drawn in WORLD coordinates. The transform bakes
      // in three things at once: the view scale, the letterbox offset, and
      // the camera — subtracting cameraX*scale means every world-space
      // drawImage/fillText below is effectively rendered at
      // (worldX - cameraX), which is what makes the view scroll. Y has no
      // camera term: vertical is fixed.
      playObj.setTransform(scale, 0, 0, scale, offsetX - cameraX * scale, offsetY);

      setObjects();

      for (const id in otherPlayers) {
        drawOtherPlayer(otherPlayers[id]);
      }

      playObj.drawImage(
        img,
        animations.currentFrame * animations.frameWidth, 
        animations.frameRow * animations.frameHeight,
        animations.frameWidth, animations.frameHeight,
        player.x- 20, player.y - 20,
        animations.frameWidth, animations.frameHeight
      );

      playObj.font = '16px Arial';
      playObj.fillStyle = player.color || 'blue';
      playObj.textAlign = 'center';
      playObj.textBaseline = 'bottom';
      playObj.fillText(player.username, player.x + player.width/2, player.y - 5);

      // Chat bubbles go on top of sprites and usernames, drawn in the same
      // world space so they scale with everything else.
      const nowMs = performance.now();
      for (const id in otherPlayers) {
        const p = otherPlayers[id];
        if (p.chatMessage && nowMs < p.chatExpiresAt) {
          drawChatBubble(playObj, p.chatMessage, (p.renderX ?? p.x) + 10, (p.renderY ?? p.y) - 22);
        }
      }
      if (player.chatMessage && nowMs < player.chatExpiresAt) {
        drawChatBubble(playObj, player.chatMessage, player.x + player.width / 2, player.y - 22);
      }

      // The HTML chat composer (only you see it) tracks your character too.
      positionChatInput();

      // HUD text drawn in real screen space so it stays a fixed, readable size.
      playObj.setTransform(1, 0, 0, 1, 0, 0);
      const scoreText = "SCORE " + player.score;
      playObj.font = 'bold 16px "Press Start 2P", monospace';
      const textWidth = playObj.measureText(scoreText).width;
      const chipX = 16, chipY = 14, chipPadX = 14, chipPadY = 12;
      const chipW = textWidth + chipPadX * 2, chipH = 16 + chipPadY * 2;

      playObj.fillStyle = '#1f3326';
      playObj.fillRect(chipX, chipY, chipW, chipH);
      playObj.strokeStyle = '#16241a';
      playObj.lineWidth = 2;
      playObj.strokeRect(chipX, chipY, chipW, chipH);
      playObj.fillStyle = '#ffc145';
      playObj.fillRect(chipX, chipY, chipW, 4); // top accent stripe

      playObj.textAlign = 'left';
      playObj.textBaseline = 'middle';
      playObj.fillStyle = '#f3f7ee';
      playObj.fillText(scoreText, chipX + chipPadX, chipY + chipH / 2 + 1);

      const now = performance.now();
      if (now - lastMoveEmit >= MOVE_EMIT_INTERVAL_MS) {
        lastMoveEmit = now;
        socket.emit("move", { x: player.x , y: player.y , frameCount: animations.frameCount, frameIndex: animations.currentFrame, frameRow:animations.frameRow, username:player.username, color:player.color, emote: player.action, score :player.score });
      }
    }

    // WASD works alongside the arrow keys — checked by lowercasing so both
    // "a" and "A" (e.g. with Caps Lock/Shift) count.
    const RIGHT_KEYS = new Set(["ArrowRight", "d"]);
    const LEFT_KEYS = new Set(["ArrowLeft", "a"]);
    const JUMP_KEYS = new Set(["ArrowUp", "w"]);
    const normKey = (key) => (key.length === 1 ? key.toLowerCase() : key);

    canvas.addEventListener('keydown', e => {
      const key = normKey(e.key);

      // T opens the chat composer. preventDefault so the "t" keystroke that
      // opened it doesn't also get typed into the freshly-focused input.
      if (key === 't' && hasJoined && !chatOpen) {
        e.preventDefault();
        openChat();
        return;
      }

      if (RIGHT_KEYS.has(key) && player.onGround) {
        player.action = "run";
        if (player.running == false){
          img = runImg;
          animations.currentFrame = 0;
          animations.frameCount = 8;
          animations.frameRow = 3;
          animationStopper = false;
        }
        player.running = true;
        player.Xv = player.speedMax;
      }
      if (LEFT_KEYS.has(key) && player.onGround) {
        player.action = "run";
        if (player.running == false){
          img = runImg;
          animations.currentFrame = 0;
          animations.frameCount = 8;
          animations.frameRow = 2;
          animationStopper = false;
        }
        player.running = true;
        player.Xv = -1* player.speedMax;
      }
      if (JUMP_KEYS.has(key))  {
        if(player.onGround == true) {
          player.jumping = true;
        }
      }

      socket.emit("move", { x: player.x , y: player.y , frameCount: animations.frameCount, frameIndex: animations.currentFrame, frameRow:animations.frameRow, username:player.username, color:player.color, emote: player.action });
      draw();
    });

    canvas.addEventListener('keyup', e => {
      const key = normKey(e.key);
      if (RIGHT_KEYS.has(key)) player.running = false;
      if (LEFT_KEYS.has(key)) player.running = false;

      if (JUMP_KEYS.has(key)) {
        if (player.onGround){
          player.jumping = false;
          player.onGround = false;
          if (player.Yforce > player.YforceMax) player.Yforce = player.YforceMax;
          player.Yv -= player.Yforce*180 + 200;
          player.Yforce = 0;
        }
      }

      socket.emit("move", { x: player.x , y: player.y , frameCount: animations.frameCount, frameIndex: animations.currentFrame, frameRow:animations.frameRow, username:player.username, color:player.color, emote: player.action });
      draw();
    });

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>

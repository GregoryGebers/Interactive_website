<!DOCTYPE html>
<html>
<head><title>Stream Overlay</title></head>
<body style="margin:0; background:transparent;">
<canvas id="overlay" width="1920" height="1080" style="position:absolute;"></canvas>
<script src="https://interactive-website-9620.onrender.com/socket.io/socket.io.js"></script>
<script>
  //"https://interactive-website-9620.onrender.com/socket.io/socket.io.js"
  const socket = io("https://interactive-website-9620.onrender.com");
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const players = {};

  const now0 = () => performance.now();

  socket.on("init", data => {
    for (const id in players) delete players[id];
    for (const id in data) {
      const p = data[id];
      players[id] = { ...p, renderX: p.x, renderY: p.y, lastUpdateAt: now0() };
    }
  });
  socket.on("new-player", data => {
    players[data.id] = { ...data, renderX: data.x, renderY: data.y, lastUpdateAt: now0() };
  });
  socket.on("player-move", data => {
    const existing = players[data.id];
    if (existing) {
      // Merge into the SAME object so renderX/renderY (the smoothed display
      // position) and the local animation state below survive — this is what
      // lets the interpolation keep easing toward the new target instead of
      // snapping straight to it.
      Object.assign(existing, data);
      existing.lastUpdateAt = now0();
    } else {
      players[data.id] = { ...data, renderX: data.x, renderY: data.y, lastUpdateAt: now0() };
    }
  });
  socket.on("remove-player", id => delete players[id]);
  const idleimg = new Image();
  idleimg.src = '/assets/characters/craftpix-net-879657-free-slime-mobs-pixel-art-top-down-sprite-pack/PNG/Slime1/Idle/Slime1_Idle_body.png';
  
  idleimg.onload = () => requestAnimationFrame(draw);

  const walkimg = new Image();
  walkimg.src = '/assets/characters/craftpix-net-879657-free-slime-mobs-pixel-art-top-down-sprite-pack/PNG/Slime1/Run/Slime1_Run_body.png';
  walkimg.onload = () => requestAnimationFrame(draw);


  const boximg = new Image();
  boximg.src = '/assets/obstacles/box_1.png';
  boximg.onload = () => requestAnimationFrame(draw);

  const coinImg = new Image();
  coinImg.src = '/assets/obstacles/coin.png';
  coinImg.onload = () => {
    requestAnimationFrame(draw);
  }

  const grassImg = new Image();
  grassImg.src = '/assets/obstacles/grass.png';
  grassImg.onload = () => {
    requestAnimationFrame(draw);
  }


  let coin = null;
  socket.on("coin", data => {
    coin = data;
    console.log("Coin received:", data.x, data.y);
  });

  socket.on("coin_taken", (data) => {
    coin = null;
    console.log("coin taken:");
  });
  

  const boxes = [
    {x: 0, y: 400, width: 20, height: 20},
    {x: 80, y: 450, width: 20, height: 20},
    {x: 100, y: 450, width: 20, height: 20},
    {x: 120, y: 450, width: 20, height: 20},
    {x: 90, y: 350, width: 20, height: 20},
    {x: 110, y: 350, width: 20, height: 20},
    {x: 200, y: 400, width: 20, height: 20},
    {x: 300, y: 480, width: 20, height: 20},
    {x: 420, y: 420, width: 20, height: 20},
    {x: 440, y: 420, width: 20, height: 20},
    {x: 550, y: 380, width: 20, height: 20},
    {x: 620, y: 340, width: 20, height: 20},
    {x: 645, y: 360, width: 20, height: 20},
    {x: 670, y: 340, width: 20, height: 20},
    {x: 750, y: 380, width: 20, height: 20},
    {x: 770, y: 380, width: 20, height: 20},
    {x: 790, y: 380, width: 20, height: 20},
    {x: 750, y: 440, width: 20, height: 20},
    {x: 770, y: 440, width: 20, height: 20},
    {x: 790, y: 440, width: 20, height: 20},


    {x: 860, y: 400, width: 20, height: 20},
    {x: 860, y: 380, width: 20, height: 20},
    
    {x: 980, y: 380, width: 20, height: 20},

  ];

  // Same fixed "world" the viewer.html physics/box layout use. The overlay
  // canvas is a different pixel size (1920x1080) than that world (1000x500),
  // so these constants are only used for the ground-grass strip below.
  const WORLD_WIDTH = 1000;
  const WORLD_HEIGHT = 500;
  const GROUND_GRASS_HEIGHT = 14;
  const GROUND_TILE_WIDTH = 40;

  // Players only send a position update ~30x/sec (see viewer.html's move
  // throttle), but this canvas redraws ~60x/sec. Snapping straight to each
  // new position on arrival is what caused the stutter/teleport look.
  // Instead we ease the drawn position toward the latest known target every
  // frame, scaled by actual elapsed time so it looks the same regardless of
  // OBS's frame rate.
  const OTHER_PLAYER_SMOOTHING_TAU = 0.08; // seconds — lower = snappier, higher = smoother
  let lastFrameTime = performance.now();

  function updatePlayerInterpolation(deltaTime) {
    const factor = 1 - Math.exp(-deltaTime / OTHER_PLAYER_SMOOTHING_TAU);
    for (const id in players) {
      const p = players[id];
      p.renderX += (p.x - p.renderX) * factor;
      p.renderY += (p.y - p.renderY) * factor;
    }
  }

  // The sprite's walk/idle cycle used to just play whatever frameIndex the
  // player's own browser tab last reported. When that tab is backgrounded
  // (viewer switches away, minimizes, etc.), browsers throttle its
  // requestAnimationFrame loop way down, so it stops sending fresh frames —
  // and the overlay, which keeps redrawing at full rate, just kept painting
  // that one stale frame forever, looking frozen.
  //
  // Fix: animate every player's sprite locally on a free-running timer here,
  // independent of the network. We only take "emote" (idle/run) and
  // "frameRow" (facing direction) from the network, and fall back to idle if
  // we haven't heard from them in a while (covers the edge case of someone
  // backgrounding their tab mid-run — otherwise they'd run in place forever).
  const FRAME_INTERVAL = 0.1; // seconds per animation frame, matches viewer.html
  const STALE_MS = 600; // no update in this long -> treat as idle

  function updatePlayerAnimation(p, deltaTime) {
    const stale = (performance.now() - (p.lastUpdateAt || 0)) > STALE_MS;
    const emote = stale ? 'idle' : (p.emote || 'idle');
    const frameCount = emote === 'run' ? 8 : 6;
    const frameRow = emote === 'run' ? (p.frameRow ?? 3) : 0;

    p.localFrameTimer = (p.localFrameTimer || 0) + deltaTime;
    if (p.localFrameTimer >= FRAME_INTERVAL) {
      p.localFrameTimer -= FRAME_INTERVAL;
      p.localFrameIndex = ((p.localFrameIndex || 0) + 1) % frameCount;
    }
    if (!(p.localFrameIndex < frameCount)) p.localFrameIndex = 0; // guard if frameCount just shrank

    return { emote, frameRow, frameIndex: p.localFrameIndex };
  }

  function draw(currentTime) {
    const now = currentTime || performance.now();
    const deltaTime = Math.min((now - lastFrameTime) / 1000, 0.25); // clamp huge gaps (e.g. tab was backgrounded)
    lastFrameTime = now;

    updatePlayerInterpolation(deltaTime);
    setObjects();
    let high_score = -1;
    let high_user = "";
    for (const id in players) {
      const p = players[id];
      // Guard against any malformed/incomplete entry (e.g. a stale server
      // version, or a mid-join race) ever hijacking the leaderboard display
      // with a blank name or bogus score.
      const validScore = typeof p.score === 'number' && Number.isFinite(p.score);
      const validName = typeof p.username === 'string' && p.username.length > 0;
      if (validScore && validName && p.score >= high_score) {
        high_score = p.score;
        high_user = p.username;
      }
      const fw = 64, fh = 64;
      const anim = updatePlayerAnimation(p, deltaTime);
      const img = anim.emote === "run" ? walkimg : idleimg;
      ctx.drawImage(
      img,
      anim.frameIndex * fw, 
      anim.frameRow * fh,
      fw, fh,
      p.renderX - 20, p.renderY - 20,
      fw, fh
    );

    ctx.font = '16px Arial';
    ctx.fillStyle = p.color || 'blue';

    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(p.username || '', p.renderX + 10, p.renderY - 5);
    }
    requestAnimationFrame(draw);
    if (high_user) {
      ctx.font = 'bold 20px Arial';
      ctx.fillStyle = 'white';
      ctx.lineWidth=5;
      ctx.strokeStyle = 'black';
      ctx.strokeText("High Score: " + high_user + " -- " + high_score, 480, 520);
      ctx.fillText("High Score: " + high_user + " -- " + high_score, 480, 520);
    }
  }

  function setObjects() {
    ctx.clearRect(0, 0, canvas.width,canvas.height);
    for (let x = 0; x < WORLD_WIDTH; x += GROUND_TILE_WIDTH) {
      ctx.drawImage(grassImg, x, WORLD_HEIGHT - GROUND_GRASS_HEIGHT, GROUND_TILE_WIDTH, GROUND_GRASS_HEIGHT);
    }
    for (const box of boxes) {
      ctx.drawImage(boximg, box.x-5, box.y-5, box.width +12, box.height +12);
    }
    if (coin != null) {
        ctx.drawImage(coinImg, coin.x, coin.y, 20, 20);
      }
  }

  requestAnimationFrame(draw);
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Stream Overlay</title>
  <!-- Needed so canvas chat bubbles can use the same retro font as
       viewer.html. OBS's browser source loads Google Fonts fine. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body style="margin:0; background:transparent;">
<canvas id="overlay" width="1920" height="1080" style="position:absolute;"></canvas>
<script src="https://interactive-website-9620.onrender.com/socket.io/socket.io.js"></script>
<script>
  //"https://interactive-website-9620.onrender.com/socket.io/socket.io.js"
  const socket = io("https://interactive-website-9620.onrender.com");
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const players = {};

  const now0 = () => performance.now();

  // Canvas fillText silently falls back to the default font until the
  // webfont is actually loaded — force-load it up front so the first chat
  // bubble doesn't render in Times New Roman.
  if (document.fonts && document.fonts.load) {
    document.fonts.load('8px "Press Start 2P"');
  }

  socket.on("init", data => {
    for (const id in players) delete players[id];
    for (const id in data) {
      const p = data[id];
      players[id] = { ...p, renderX: p.x, renderY: p.y, lastUpdateAt: now0() };
    }
  });
  socket.on("new-player", data => {
    players[data.id] = { ...data, renderX: data.x, renderY: data.y, lastUpdateAt: now0() };
  });
  socket.on("player-move", data => {
    const existing = players[data.id];
    if (existing) {
      // Merge into the SAME object so renderX/renderY (the smoothed display
      // position) and the local animation state below survive — this is what
      // lets the interpolation keep easing toward the new target instead of
      // snapping straight to it.
      Object.assign(existing, data);
      existing.lastUpdateAt = now0();
    } else {
      players[data.id] = { ...data, renderX: data.x, renderY: data.y, lastUpdateAt: now0() };
    }
  });
  socket.on("remove-player", id => delete players[id]);

  // ---- Chat bubbles ----------------------------------------------------------
  // The server broadcasts already-filtered messages as {id, message}.
  // Attach the message to the matching player and let draw() render it as a
  // pixel speech bubble until it expires.
  const CHAT_DURATION_MS = 6000;

  socket.on('chat', data => {
    if (!data || typeof data.message !== 'string' || !data.message) return;
    const p = players[data.id];
    if (!p) return;
    p.chatMessage = data.message;
    p.chatExpiresAt = now0() + CHAT_DURATION_MS;
  });

  // ---- Bat swings --------------------------------------------------------
  // The server broadcasts 'player-swing' {id, dir} whenever someone presses
  // space in viewer.html. The overlay just plays the same 250ms bottom-to-
  // top swipe animation viewer.html uses, anchored to that player's sprite.
  // (The knockback itself needs no overlay logic — the launched player's
  // own client applies the velocity, and their normal position updates
  // carry the flight here like any other movement.)
  const SWING_DURATION_MS = 250;

  socket.on('player-swing', data => {
    if (!data) return;
    const p = players[data.id];
    if (!p) return;
    p.swingStartAt = now0();
    p.swingDir = Number(data.dir) === -1 ? -1 : 1;
  });

  const CHAT_FONT = '8px "Press Start 2P", monospace';
  const CHAT_LINE_HEIGHT = 12;
  const CHAT_PAD = 6;
  const CHAT_MAX_LINE_CHARS = 18;

  function wrapChatLines(text, maxChars) {
    const lines = [];
    let line = '';
    for (let word of text.split(' ')) {
      // Hard-break words longer than a whole line so they can't blow the
      // bubble out sideways.
      while (word.length > maxChars) {
        if (line) { lines.push(line); line = ''; }
        lines.push(word.slice(0, maxChars));
        word = word.slice(maxChars);
      }
      if (!word) continue;
      if (!line) {
        line = word;
      } else if (line.length + 1 + word.length <= maxChars) {
        line += ' ' + word;
      } else {
        lines.push(line);
        line = word;
      }
    }
    if (line) lines.push(line);
    return lines;
  }

  // Same pixel look as viewer.html: hard-edged box, offset shadow, blocky
  // stepped tail, no rounded corners or blur.
  function drawChatBubble(context, text, cx, bottomY) {
    const lines = wrapChatLines(text, CHAT_MAX_LINE_CHARS);
    context.font = CHAT_FONT;
    let maxW = 0;
    for (const l of lines) maxW = Math.max(maxW, context.measureText(l).width);
    const w = Math.ceil(maxW) + CHAT_PAD * 2;
    const h = lines.length * CHAT_LINE_HEIGHT + CHAT_PAD * 2 - 3;
    const x = Math.round(cx - w / 2);
    const y = Math.round(bottomY - h - 8); // leave room for the tail

    // Offset shadow, then body, then border.
    context.fillStyle = '#16241a';
    context.fillRect(x + 2, y + 2, w, h);
    context.fillStyle = '#f3f7ee';
    context.fillRect(x, y, w, h);
    context.lineWidth = 2;
    context.strokeStyle = '#16241a';
    context.strokeRect(x, y, w, h);

    // Pixel-step tail (two shrinking blocks) pointing at the character.
    context.fillStyle = '#16241a';
    context.fillRect(cx - 5, y + h, 10, 5);
    context.fillRect(cx - 3, y + h + 3, 6, 5);
    context.fillStyle = '#f3f7ee';
    context.fillRect(cx - 3, y + h - 1, 6, 4);
    context.fillRect(cx - 1, y + h + 3, 2, 3);

    context.fillStyle = '#16241a';
    context.textAlign = 'left';
    context.textBaseline = 'top';
    let ty = y + CHAT_PAD;
    for (const l of lines) {
      context.fillText(l, x + CHAT_PAD, ty);
      ty += CHAT_LINE_HEIGHT;
    }
  }

  const idleimg = new Image();
  idleimg.src = '/assets/characters/craftpix-net-879657-free-slime-mobs-pixel-art-top-down-sprite-pack/PNG/Slime1/Idle/Slime1_Idle_body.png';
  
  idleimg.onload = () => requestAnimationFrame(draw);

  const walkimg = new Image();
  walkimg.src = '/assets/characters/craftpix-net-879657-free-slime-mobs-pixel-art-top-down-sprite-pack/PNG/Slime1/Run/Slime1_Run_body.png';
  walkimg.onload = () => requestAnimationFrame(draw);


  const boximg = new Image();
  boximg.src = '/assets/obstacles/box_1.png';
  boximg.onload = () => requestAnimationFrame(draw);

  const coinImg = new Image();
  coinImg.src = '/assets/obstacles/coin.png';
  coinImg.onload = () => {
    requestAnimationFrame(draw);
  }

  const grassImg = new Image();
  grassImg.src = '/assets/obstacles/grass.png';
  grassImg.onload = () => {
    requestAnimationFrame(draw);
  }

  // Bat sprite is drawn VERTICALLY (grip at the bottom) — the swing code
  // rotates it around the grip, so image-up = where the bat points.
  const batImg = new Image();
  batImg.src = '/assets/obstacles/bat.png';


  let coin = null;
  socket.on("coin", data => {
    coin = data;
    console.log("Coin received:", data.x, data.y);
  });

  socket.on("coin_taken", (data) => {
    coin = null;
    console.log("coin taken:");
  });
  

  const boxes = [
    {x: 0, y: 400, width: 20, height: 20},
    {x: 80, y: 450, width: 20, height: 20},
    {x: 100, y: 450, width: 20, height: 20},
    {x: 120, y: 450, width: 20, height: 20},
    {x: 90, y: 350, width: 20, height: 20},
    {x: 110, y: 350, width: 20, height: 20},
    {x: 200, y: 400, width: 20, height: 20},
    {x: 300, y: 480, width: 20, height: 20},
    {x: 420, y: 420, width: 20, height: 20},
    {x: 440, y: 420, width: 20, height: 20},
    {x: 550, y: 380, width: 20, height: 20},
    {x: 620, y: 340, width: 20, height: 20},
    {x: 645, y: 360, width: 20, height: 20},
    {x: 670, y: 340, width: 20, height: 20},
    {x: 750, y: 380, width: 20, height: 20},
    {x: 770, y: 380, width: 20, height: 20},
    {x: 790, y: 380, width: 20, height: 20},
    {x: 750, y: 440, width: 20, height: 20},
    {x: 770, y: 440, width: 20, height: 20},
    {x: 790, y: 440, width: 20, height: 20},


    {x: 860, y: 400, width: 20, height: 20},
    {x: 860, y: 380, width: 20, height: 20},
    
    {x: 980, y: 380, width: 20, height: 20},

    // ---- Extended world: second screen (1000-2000) ----
    {x: 1060, y: 440, width: 20, height: 20},
    {x: 1080, y: 440, width: 20, height: 20},
    {x: 1160, y: 400, width: 20, height: 20},
    {x: 1240, y: 360, width: 20, height: 20},
    {x: 1260, y: 360, width: 20, height: 20},
    {x: 1350, y: 440, width: 20, height: 20},
    {x: 1370, y: 440, width: 20, height: 20},
    {x: 1390, y: 440, width: 20, height: 20},
    {x: 1380, y: 340, width: 20, height: 20},
    {x: 1400, y: 340, width: 20, height: 20},
    {x: 1500, y: 400, width: 20, height: 20},
    {x: 1520, y: 400, width: 20, height: 20},
    {x: 1600, y: 340, width: 20, height: 20},
    {x: 1660, y: 380, width: 20, height: 20},
    {x: 1680, y: 380, width: 20, height: 20},
    {x: 1780, y: 460, width: 20, height: 20},
    {x: 1780, y: 440, width: 20, height: 20},
    {x: 1780, y: 420, width: 20, height: 20},
    {x: 1860, y: 400, width: 20, height: 20},
    {x: 1880, y: 400, width: 20, height: 20},
    {x: 1960, y: 360, width: 20, height: 20},

    // ---- Extended world: third screen (2000-3000) ----
    {x: 2040, y: 440, width: 20, height: 20},
    {x: 2060, y: 440, width: 20, height: 20},
    {x: 2140, y: 400, width: 20, height: 20},
    {x: 2220, y: 360, width: 20, height: 20},
    {x: 2240, y: 360, width: 20, height: 20},
    {x: 2320, y: 420, width: 20, height: 20},
    {x: 2400, y: 460, width: 20, height: 20},
    {x: 2420, y: 460, width: 20, height: 20},
    {x: 2440, y: 460, width: 20, height: 20},
    {x: 2420, y: 440, width: 20, height: 20},
    {x: 2540, y: 400, width: 20, height: 20},
    {x: 2620, y: 360, width: 20, height: 20},
    {x: 2640, y: 360, width: 20, height: 20},
    {x: 2720, y: 420, width: 20, height: 20},
    {x: 2740, y: 420, width: 20, height: 20},
    {x: 2840, y: 380, width: 20, height: 20},
    {x: 2900, y: 440, width: 20, height: 20},
    {x: 2920, y: 440, width: 20, height: 20},
    {x: 2980, y: 400, width: 20, height: 20},
  ];

  // Same fixed "world" the viewer.html physics/box layout use — now 3000
  // wide (three screens). Unlike viewer.html, the overlay has NO camera:
  // it always shows the ENTIRE world at once by scaling world coordinates
  // down to fit the canvas width. Vertical stays fixed; the same uniform
  // factor is applied to Y so sprites keep their proportions instead of
  // getting squashed.
  const WORLD_WIDTH = 3000;
  const WORLD_HEIGHT = 500;
  const GROUND_GRASS_HEIGHT = 14;
  const GROUND_TILE_WIDTH = 40;

  // 1920 / 3000 = 0.64 — every world unit is 0.64 overlay pixels.
  const WORLD_SCALE = canvas.width / WORLD_WIDTH;

// Push the rendered world down so jumping players/chat do not get cut off at the top.
const WORLD_OFFSET_Y = 100;

  // Players only send a position update ~30x/sec (see viewer.html's move
  // throttle), but this canvas redraws ~60x/sec. Snapping straight to each
  // new position on arrival is what caused the stutter/teleport look.
  // Instead we ease the drawn position toward the latest known target every
  // frame, scaled by actual elapsed time so it looks the same regardless of
  // OBS's frame rate.
  const OTHER_PLAYER_SMOOTHING_TAU = 0.08; // seconds — lower = snappier, higher = smoother
  let lastFrameTime = performance.now();

  function updatePlayerInterpolation(deltaTime) {
    const factor = 1 - Math.exp(-deltaTime / OTHER_PLAYER_SMOOTHING_TAU);
    for (const id in players) {
      const p = players[id];
      p.renderX += (p.x - p.renderX) * factor;
      p.renderY += (p.y - p.renderY) * factor;
    }
  }

  // The sprite's walk/idle cycle used to just play whatever frameIndex the
  // player's own browser tab last reported. When that tab is backgrounded
  // (viewer switches away, minimizes, etc.), browsers throttle its
  // requestAnimationFrame loop way down, so it stops sending fresh frames —
  // and the overlay, which keeps redrawing at full rate, just kept painting
  // that one stale frame forever, looking frozen.
  //
  // Fix: animate every player's sprite locally on a free-running timer here,
  // independent of the network. We only take "emote" (idle/run) and
  // "frameRow" (facing direction) from the network, and fall back to idle if
  // we haven't heard from them in a while (covers the edge case of someone
  // backgrounding their tab mid-run — otherwise they'd run in place forever).
  const FRAME_INTERVAL = 0.1; // seconds per animation frame, matches viewer.html
  const STALE_MS = 600; // no update in this long -> treat as idle

  function updatePlayerAnimation(p, deltaTime) {
    const stale = (performance.now() - (p.lastUpdateAt || 0)) > STALE_MS;
    const emote = stale ? 'idle' : (p.emote || 'idle');
    const frameCount = emote === 'run' ? 8 : 6;
    const frameRow = emote === 'run' ? (p.frameRow ?? 3) : 0;

    p.localFrameTimer = (p.localFrameTimer || 0) + deltaTime;
    if (p.localFrameTimer >= FRAME_INTERVAL) {
      p.localFrameTimer -= FRAME_INTERVAL;
      p.localFrameIndex = ((p.localFrameIndex || 0) + 1) % frameCount;
    }
    if (!(p.localFrameIndex < frameCount)) p.localFrameIndex = 0; // guard if frameCount just shrank

    return { emote, frameRow, frameIndex: p.localFrameIndex };
  }

  // ---- Bat swing rendering -------------------------------------------------
  // Identical animation math to viewer.html: the bat pivots around the
  // character's center (the grip), sweeping from low-forward to up-forward
  // with an ease-out, mirrored for left-facing swings. Drawn in WORLD space
  // (inside the scaled transform), so it shrinks with the sprites exactly
  // like everything else on the overlay.
  const BAT_DRAW_W = 9;
  const BAT_DRAW_H = 26;
  const SWING_START_ANGLE = 2.4;   // radians clockwise from straight-up (~137deg, low)
  const SWING_END_ANGLE = -0.35;   // slightly past vertical (~-20deg, high)

  function drawBatSwing(context, cx, cy, dir, progress) {
    if (!batImg.complete || !batImg.naturalWidth) return; // image not loaded yet
    const t = Math.min(Math.max(progress, 0), 1);
    // Ease-out so the swipe starts fast and finishes soft, like a real swing.
    const eased = 1 - (1 - t) * (1 - t);
    const angle = SWING_START_ANGLE + (SWING_END_ANGLE - SWING_START_ANGLE) * eased;
    context.save();
    context.translate(cx, cy);
    context.scale(dir, 1);
    context.rotate(angle);
    // Grip at the pivot, barrel extending "up" in local space.
    context.drawImage(batImg, -BAT_DRAW_W / 2, -BAT_DRAW_H, BAT_DRAW_W, BAT_DRAW_H);
    context.restore();
  }

  function draw(currentTime) {
    const now = currentTime || performance.now();
    const deltaTime = Math.min((now - lastFrameTime) / 1000, 0.25); // clamp huge gaps (e.g. tab was backgrounded)
    lastFrameTime = now;

    updatePlayerInterpolation(deltaTime);
    setObjects(); // leaves the world-scale transform active

    // ---- Pass 1: sprites, in scaled WORLD space ----
    let high_score = -1;
    let high_user = "";
    for (const id in players) {
      const p = players[id];
      // Guard against any malformed/incomplete entry (e.g. a stale server
      // version, or a mid-join race) ever hijacking the leaderboard display
      // with a blank name or bogus score.
      const validScore = typeof p.score === 'number' && Number.isFinite(p.score);
      const validName = typeof p.username === 'string' && p.username.length > 0;
      if (validScore && validName && p.score >= high_score) {
        high_score = p.score;
        high_user = p.username;
      }
      const fw = 64, fh = 64;
      const anim = updatePlayerAnimation(p, deltaTime);
      const img = anim.emote === "run" ? walkimg : idleimg;
      ctx.drawImage(
        img,
        anim.frameIndex * fw,
        anim.frameRow * fh,
        fw, fh,
        p.renderX - 20, p.renderY - 20,
        fw, fh
      );
    }

    // Bat swings go over the sprites (the bat passes in front of the
    // character), still in the same scaled world space. Each swing plays
    // for SWING_DURATION_MS from when its event arrived.
    const swingNowMs = performance.now();
    for (const id in players) {
      const p = players[id];
      if (p.swingStartAt && swingNowMs - p.swingStartAt < SWING_DURATION_MS) {
        drawBatSwing(
          ctx,
          p.renderX + 10, // sprite center (matches the name-label offset)
          p.renderY + 10,
          p.swingDir || 1,
          (swingNowMs - p.swingStartAt) / SWING_DURATION_MS
        );
      }
    }

    // ---- Pass 2: text, in SCREEN space ----
    // Names and chat bubbles are drawn at scaled positions but full pixel
    // size — at WORLD_SCALE (0.64) a world-space 16px name would be ~10px
    // and bubble text ~5px, unreadable on stream.
    ctx.setTransform(1, 0, 0, 1, 0, 0);

    for (const id in players) {
      const p = players[id];
      ctx.font = '16px Arial';
      ctx.fillStyle = p.color || 'blue';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(p.username || '', (p.renderX + 10) * WORLD_SCALE, WORLD_OFFSET_Y + (p.renderY - 5) * WORLD_SCALE);
    }

    // Chat bubbles on top of every sprite/name, so they're never hidden
    // behind another player who happens to be standing in front.
    const nowMs = performance.now();
    for (const id in players) {
      const p = players[id];
      if (p.chatMessage && nowMs < p.chatExpiresAt) {
        drawChatBubble(ctx, p.chatMessage, (p.renderX + 10) * WORLD_SCALE, WORLD_OFFSET_Y + (p.renderY - 22) * WORLD_SCALE);
      }
    }

    requestAnimationFrame(draw);
    if (high_user) {
      // Centered under the scaled world (which is WORLD_HEIGHT*WORLD_SCALE
      // pixels tall), instead of the old hardcoded spot tuned for the
      // unscaled 1000x500 layout.
      ctx.font = 'bold 20px Arial';
      ctx.fillStyle = 'white';
      ctx.lineWidth = 5;
      ctx.strokeStyle = 'black';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const hsX = canvas.width / 2;
      const hsY = WORLD_OFFSET_Y + WORLD_HEIGHT * WORLD_SCALE + 18;
      ctx.strokeText("High Score: " + high_user + " -- " + high_score, hsX, hsY);
      ctx.fillText("High Score: " + high_user + " -- " + high_score, hsX, hsY);
    }
  }

  function setObjects() {
    // Clear in raw pixel space, then switch into scaled world space so the
    // ENTIRE 3000-wide world maps onto the canvas — no cameraX here, the
    // overlay always shows everything.
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.setTransform(WORLD_SCALE, 0, 0, WORLD_SCALE, 0, WORLD_OFFSET_Y);

    for (let x = 0; x < WORLD_WIDTH; x += GROUND_TILE_WIDTH) {
      ctx.drawImage(grassImg, x, WORLD_HEIGHT - GROUND_GRASS_HEIGHT, GROUND_TILE_WIDTH, GROUND_GRASS_HEIGHT);
    }
    for (const box of boxes) {
      ctx.drawImage(boximg, box.x-5, box.y-5, box.width +12, box.height +12);
    }
    if (coin != null) {
        ctx.drawImage(coinImg, coin.x, coin.y, 20, 20);
      }
  }

  requestAnimationFrame(draw);
</script>
</body>
</html>
